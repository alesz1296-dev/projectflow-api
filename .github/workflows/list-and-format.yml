# Workflow Name
name: Code Quality & Formatting

# When to run
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# What to do
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Check out code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint for code quality
      - name: Check code style with ESLint
        run: npm run lint
        # Don't fail if eslint has warnings, only errors
        continue-on-error: false

      # Step 5: Check Prettier formatting
      - name: Check code formatting with Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,json}"

      # Step 6: Optional - Generate quality report
      - name: Generate quality report
        run: npm run lint -- --format json > eslint-report.json || true
        continue-on-error: true

      # Step 7: Upload report as artifact
      - name: Upload ESLint report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: eslint-report
          path: eslint-report.json
